[pytest]
testpaths = tests
python_files = test_*.py
# The app fixture drives Tk via repeated .update() calls rather than a
# real blocking mainloop() (there's no way to run test code *during* a
# blocking mainloop()). Some tabs' periodic background-refresh threads
# call .after() expecting a real mainloop() to be active, which Python's
# tkinter now checks for explicitly — harmless here since it only affects
# threads unrelated to whatever a given test is actually checking, but
# noisy. See ui/media_users_tab.py / ui/now_playing_tab.py for the actual
# production fix for this same race (app closed mid-fetch); it hasn't
# been applied to every tab with a background refresh loop.
filterwarnings =
    ignore::pytest.PytestUnhandledThreadExceptionWarning
    ignore::pytest.PytestUnraisableExceptionWarning
